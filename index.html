<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --button: var(--tg-theme-button-color, #007aff);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
               background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .wallet-card { background: var(--tg-theme-secondary-bg-color, #f2f2f7); width: 100%; border-radius: 20px; padding: 25px; box-sizing: border-box; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .balance-label { font-size: 14px; color: var(--hint); text-transform: uppercase; letter-spacing: 1px; }
        .balance-amount { font-size: 42px; font-weight: 700; margin: 10px 0; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 20px; }
        button { background-color: var(--button); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="wallet-card">
        <div class="balance-label">Доступный баланс</div>
        <div class="balance-amount" id="bal">0.00 NSCT</div>
        <div id="user-name" style="color: var(--hint); font-size: 14px;">Инициализация...</div>
    </div>

    <div class="btn-group">
        <button onclick="tg.showAlert('Функция отправки скоро появится')">Отправить</button>
        <button onclick="tg.close()">Закрыть</button>
    </div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe.user;
    if (user) {
        document.getElementById('user-name').innerText = `@${user.username}`;
        
        // ЗАПРОС К БОТУ ЗА РЕАЛЬНЫМ БАЛАНСОМ
        fetch(`http://92.245.124.247:8080/api/balance?user_id=${user.id}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('bal').innerText = `${data.balance.toFixed(2)} NSCT`;
            })
            .catch(err => {
                document.getElementById('bal').innerText = "Ошибка связи";
            });
    }
</script>
</body>
</html>
