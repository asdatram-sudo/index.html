<script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        const user = tg.initDataUnsafe.user;

        async function loadData() {
            if (!user) {
                console.error("Данные пользователя не найдены");
                return;
            }
            try {
                // ВАЖНО: Убрал порт :8080, так как ngrok работает через стандартный https (443)
                const url = `https://ongoing-rutha-pedicellar.ngrok-free.dev/api/balance?user_id=${user.id}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                document.getElementById('balance').innerText = `${data.balance.toFixed(2)} NSCT`;
                document.getElementById('acc_num').innerText = `Счет: ${data.account || 'Не привязан'}`;
            } catch (e) { 
                console.error("Ошибка загрузки баланса:", e);
                document.getElementById('balance').innerText = "Ошибка API";
            }
        }

        function sendTransfer() {
            const acc = document.getElementById('target_acc').value;
            const amt = document.getElementById('amount').value;
            
            if(!acc || !amt) return tg.showAlert("Заполните все поля!");

            tg.sendData(JSON.stringify({
                action: "transfer",
                to: acc,
                amount: parseFloat(amt)
            }));
            tg.close();
        }

        function scanQR() {
            tg.showScanQrPopup({ text: "Наведите на QR-код кошелька" }, (data) => {
                document.getElementById('target_acc').value = data;
                tg.closeScanQrPopup();
            });
        }

        loadData();
    </script>
